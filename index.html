<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara McKee — Digital Designer</title>
<meta name="description" content="Sara McKee is a digital designer with 10+ years experience, available for freelance, contract, and full-time work.">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Lexend',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.skip-link{position:fixed;top:-100%;left:1rem;z-index:9999;background:#0f1014;color:#FDFDFD;padding:.6rem 1.3rem;font-size:.875rem;text-decoration:none;transition:top .2s;}
.skip-link:focus{top:1rem;}

/* LOADER */
#loader{position:fixed;inset:0;z-index:900;background:#0f1014;display:flex;align-items:center;justify-content:center;transition:opacity 1s cubic-bezier(.76,0,.24,1);}
#loader.out{opacity:0;pointer-events:none;}
.loader-name{font-family:'Spectral',Georgia,serif;font-size:clamp(2.5rem,7vw,5.5rem);font-weight:600;font-style:italic;color:#FDFDFD;letter-spacing:-.03em;overflow:hidden;}
.loader-name span{display:block;transform:translateY(110%);animation:liftIn 1s cubic-bezier(.76,0,.24,1) .1s both;}
@keyframes liftIn{to{transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes lineGrow{0%{transform:scaleX(0)}50%{transform:scaleX(1)}100%{transform:scaleX(0)}}

/* SLIDES */
#slides{position:fixed;inset:0;z-index:0;}
.slide{position:absolute;inset:0;display:flex;align-items:flex-end;overflow:hidden;opacity:0;pointer-events:none;transition:opacity .65s cubic-bezier(.76,0,.24,1);}
.slide.active{opacity:1;pointer-events:auto;}
.slide-bg{position:absolute;inset:0;}

/* IMAGE — right side, floating */
.slide-img-wrap{
  position:absolute;right:6vw;top:50%;
  width:clamp(260px,36vw,560px);z-index:2;
  filter:drop-shadow(0 28px 56px rgba(0,0,0,.32));
  opacity:0;
  transform:translateY(-44%) rotate(2.5deg) scale(.96);
  transition:opacity .9s cubic-bezier(.76,0,.24,1) .2s, transform 1.1s cubic-bezier(.76,0,.24,1) .15s;
}
.slide.active .slide-img-wrap{opacity:1;transform:translateY(-50%) rotate(2.5deg) scale(1);}
.slide-img-wrap img{width:100%;display:block;border-radius:6px;aspect-ratio:4/3;object-fit:cover;}

/* CONTENT — bottom left */
.slide-content{
  position:relative;z-index:3;
  padding:0 0 5.5rem 6vw;
  max-width:56vw;
  transform:translateY(28px);opacity:0;
  transition:transform 1s cubic-bezier(.76,0,.24,1) .08s, opacity .85s cubic-bezier(.76,0,.24,1) .08s;
}
.slide.active .slide-content{transform:none;opacity:1;}
.slide-eyebrow{font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;margin-bottom:.9rem;opacity:.65;display:flex;align-items:center;gap:.6rem;}
.slide-eyebrow::before{content:'';display:block;width:18px;height:1px;background:currentColor;flex-shrink:0;}
.slide-title{font-family:'Spectral',Georgia,serif;font-size:clamp(3.8rem,9.5vw,10rem);font-weight:800;line-height:.88;letter-spacing:-.04em;margin-bottom:1.5rem;}
.slide-title em{font-style:italic;font-weight:600;}
.slide-desc{font-size:clamp(1rem,1.1vw,1.1rem);line-height:1.8;max-width:40ch;margin-bottom:2rem;opacity:.72;}
.slide-cta{display:inline-flex;align-items:center;gap:.55rem;font-size:.75rem;letter-spacing:.22em;text-transform:uppercase;text-decoration:none;font-weight:400;border-bottom:1.5px solid currentColor;padding-bottom:.25rem;transition:gap .3s cubic-bezier(.76,0,.24,1),opacity .2s;}
.slide-cta:hover{gap:1.1rem;opacity:.75;}
.slide-cta svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}

/* NAV — highest z-index among chrome elements */
nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:1.8rem 3rem;display:flex;align-items:center;justify-content:space-between;pointer-events:none;color:#FDFDFD;}
.nav-logo{color:inherit;font-family:'Spectral',Georgia,serif;font-size:.88rem;font-weight:600;text-decoration:none;letter-spacing:.08em;text-transform:uppercase;pointer-events:auto;opacity:0;animation:fadeUp .8s cubic-bezier(.76,0,.24,1) 1.15s both;transition:color .6s;display:flex;align-items:center;gap:.55rem;}
.nav-logo-img{width:22px;height:22px;object-fit:contain;flex-shrink:0;opacity:.9;transition:opacity .4s cubic-bezier(.76,0,.24,1);}
.nav-links{display:flex;align-items:center;gap:2rem;list-style:none;pointer-events:auto;opacity:0;animation:fadeUp .8s cubic-bezier(.76,0,.24,1) 1.3s both;}
.nav-links a,.nav-links button{color:inherit;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;transition:opacity .2s,color .6s;background:none;border:none;cursor:pointer;font-family:'Lexend',sans-serif;font-weight:300;padding:0;}
.nav-links a:hover,.nav-links button:hover{opacity:.55;}
.nav-social{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;opacity:.7;transition:opacity .2s,color .6s;}
.nav-social:hover{opacity:1 !important;}
.nav-social svg{width:16px;height:16px;fill:currentColor;display:block;}
.nav-social.nav-social--stroke svg{fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.nav-sep{width:1px;height:14px;background:currentColor;opacity:.2;margin:0 .2rem;}

/* EMAIL FLIP */
.email-btn{position:relative;height:1.1em;display:inline-flex;align-items:center;}
.email-face-front,.email-face-back{display:flex;align-items:center;gap:.3rem;white-space:nowrap;transition:opacity .28s,transform .4s cubic-bezier(.76,0,.24,1);}
.email-face-back{position:absolute;left:0;opacity:0;transform:translateY(5px);}
.email-face-back svg{width:9px;height:9px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.email-btn:hover .email-face-front,.email-btn.flipped .email-face-front{opacity:0;transform:translateY(-5px);}
.email-btn:hover .email-face-back,.email-btn.flipped .email-face-back{opacity:1;transform:none;}

/* SIDE DOTS — below nav */
#side-dots{position:fixed;right:2rem;top:50%;transform:translateY(-50%);z-index:400;display:flex;flex-direction:column;gap:.8rem;opacity:0;animation:fadeUp .8s cubic-bezier(.76,0,.24,1) 1.5s both;}
.s-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid currentColor;opacity:.3;cursor:pointer;transition:opacity .3s,transform .3s,background .3s;background:transparent;padding:0;}
.s-dot.active{opacity:1;background:currentColor;transform:scale(1.35);}
.s-dot:hover:not(.active){opacity:.6;}

/* COUNTER — below nav so it never overlaps nav text */
#counter{position:fixed;bottom:2.5rem;right:3rem;z-index:400;font-family:'Spectral',Georgia,serif;font-style:italic;font-size:.9rem;display:flex;align-items:baseline;gap:.35rem;opacity:0;animation:fadeUp .8s cubic-bezier(.76,0,.24,1) 1.6s both;transition:color .6s;}
#ctr-num{overflow:hidden;display:inline-block;line-height:1.3;}
.ctr-inner{display:block;transition:transform .38s cubic-bezier(.76,0,.24,1);}
#ctr-sep,#ctr-total{opacity:.38;font-style:normal;font-size:.6rem;letter-spacing:.1em;}

/* SCROLL HINT */
#scroll-hint{position:fixed;left:3rem;bottom:2.6rem;z-index:400;display:flex;align-items:center;gap:.7rem;font-size:.7rem;letter-spacing:.24em;text-transform:uppercase;opacity:0;animation:fadeUp .8s cubic-bezier(.76,0,.24,1) 1.7s both;transition:color .6s;}
.sh-line{width:28px;height:1px;background:currentColor;transform-origin:left;animation:lineGrow 2.4s cubic-bezier(.76,0,.24,1) infinite;}

/* AVAIL */
#avail{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);z-index:400;display:flex;align-items:center;gap:.5rem;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;border:1px solid currentColor;border-radius:100px;padding:.4rem 1rem;opacity:0;animation:fadeUp .8s cubic-bezier(.76,0,.24,1) 1.8s both;transition:color .6s,border-color .6s;white-space:nowrap;}
.avail-dot{width:6px;height:6px;border-radius:50%;background:#6db98a;animation:blink 2s ease-in-out infinite;flex-shrink:0;}

/* MOBILE */
@media(max-width:768px){
  html,body{overflow:auto;height:auto;}
  #slides,#side-dots,#counter,#scroll-hint,#avail,nav{display:none!important;}
  .mobile-only{display:block!important;}
}
.mobile-only{display:none;}
.m-wrap{background:#0f1014;}
.m-nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.3rem 1.4rem;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);}
.m-nav a{font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;color:#FDFDFD;}
.m.nav-logo{color:inherit;font-family:'Spectral',Georgia,serif;font-weight:600;display:flex;align-items:center;gap:.55rem;}
.m-hero{min-height:100svh;display:flex;flex-direction:column;justify-content:flex-end;padding:2rem 1.5rem 4rem;position:relative;overflow:hidden;}
.m-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.m-hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,rgba(0,0,0,.15) 55%);}
.m-hero-content{position:relative;z-index:1;color:#FDFDFD;}
.m-eye{font-size:.58rem;letter-spacing:.26em;text-transform:uppercase;opacity:.65;margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem;}
.m-eye::before{content:'';width:14px;height:1px;background:#FDFDFD;display:block;}
.m-h1{font-family:'Spectral',Georgia,serif;font-size:clamp(3.2rem,13vw,5.5rem);font-weight:800;line-height:.88;letter-spacing:-.04em;margin-bottom:1.2rem;}
.m-h1 em{font-style:italic;}
.m-desc{font-size:1rem;line-height:1.75;opacity:.75;max-width:34ch;margin-bottom:1.8rem;}
.m-cta{display:inline-flex;align-items:center;gap:.5rem;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:#FDFDFD;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.45);padding-bottom:.2rem;}
.m-projects{padding:2.5rem 1.4rem 4rem;}
.m-proj-label{font-size:.58rem;letter-spacing:.24em;text-transform:uppercase;color:rgba(253,253,253,.4);margin-bottom:1.8rem;display:flex;align-items:center;gap:.45rem;}
.m-proj-label::before{content:'';width:12px;height:1px;background:rgba(253,253,253,.4);display:block;}
.m-card{display:flex;flex-direction:column;text-decoration:none;border-radius:10px;overflow:hidden;margin-bottom:1.2rem;}
.m-card-img{width:100%;aspect-ratio:16/9;overflow:hidden;}
.m-card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s;}
.m-card:hover .m-card-img img{transform:scale(1.04);}
.m-card-body{padding:1.2rem 1.3rem 1.5rem;}
.m-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;}
.m-card-num{font-family:'Spectral',Georgia,serif;font-style:italic;font-size:1.8rem;font-weight:600;opacity:.1;line-height:1;}
.m-card-cat{font-size:.53rem;letter-spacing:.16em;text-transform:uppercase;opacity:.6;}
.m-card-title{font-family:'Spectral',Georgia,serif;font-size:1.5rem;font-weight:800;line-height:.92;letter-spacing:-.03em;margin-bottom:.6rem;}
.m-card-title em{font-style:italic;font-weight:600;}
.m-card-desc{font-size:.9rem;line-height:1.7;opacity:.7;margin-bottom:.9rem;}
.m-card-cta{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;display:flex;align-items:center;gap:.4rem;opacity:.8;}
.m-card-cta svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
:focus-visible{outline:2px solid currentColor;outline-offset:3px;border-radius:2px;}
</style>
</head>

<script>
const PROJECTS = [
  {
    num:'01', plain:'IncluDesign Projector App',
    title:'IncluDesign<br><em>Projector App</em>',
    cat:'UX Design', tags:['Inclusive Design','Accessibility','Interactive Prototype'],
    img:'img/includesign/hero.jpeg', link:'includesign.html',
    bg:'#0f1014', color:'#FDFDFD', logo:'img/logowhite.png',
    eyebrow:'UX Design — Case Study 01',
    desc:'Designing an accessible classroom projector app that empowers every student to engage and participate fully.'
  },
  {
    num:'02', plain:'ProcrastiGreat Planning App',
    title:'ProcrastiGreat<br><em>Planning App</em>',
    cat:'UI Design', tags:['Style Guide','Icon Design','Mobile UI'],
    img:'img/procrastigreat/mock2.jpeg', link:'procrastigreat.html',
    bg:'#857028', color:'#FDFDFD', logo:'img/logowhite.png',
    eyebrow:'UI Design — Case Study 02',
    desc:'Visual systems and mobile UI that make productivity feel effortless — and even a little fun.'
  },
  {
    num:'03', plain:'Eva Konopka Art Website',
    title:'Eva Konopka<br><em>Art Website</em>',
    cat:'UX Design', tags:['Redesign','B2C','Sales Conversion'],
    img:'img/evakonopka/hero2.jpeg', link:'evakonopkaart.html',
    bg:'#E7E2D0', color:'#0f1014', logo:'img/logoblack.png',
    eyebrow:'UX Design — Case Study 03',
    desc:'Turning a beautiful art practice into a website that sells — brand-true, conversion-ready, effortlessly navigable.'
  },
  {
    num:'04', plain:'SoloDareity Travel Web-App',
    title:'SoloDareity<br><em>Travel App</em>',
    cat:'UX Design', tags:['Responsive Design','User Research','Usability Testing'],
    img:'img/solodareity/hero.jpeg', link:'solodareity.html',
    bg:'#4f564A', color:'#FDFDFD', logo:'img/logowhite.png',
    eyebrow:'UX Design — Case Study 04',
    desc:'Research-driven UX for solo travelers — building confidence, community, and discovery at every step.'
  }
];

const ease = 'cubic-bezier(.76,0,.24,1)';
const pad = n => n < 10 ? '0'+n : ''+n;
const isMob = () => window.innerWidth <= 768;

const slidesEl   = document.getElementById('slides');
const sideDotsEl = document.getElementById('side-dots');
const ctrInner   = document.getElementById('ctr-inner');
const ctrTotal   = document.getElementById('ctr-total');
ctrTotal.textContent = '0' + PROJECTS.length;

let cur = 0, busy = false;

/* Build slides */
PROJECTS.forEach((p, i) => {
  const s = document.createElement('div');
  s.className = 'slide' + (i===0 ? ' active':'');
  s.setAttribute('role','article');
  s.setAttribute('aria-label', p.plain + (i===0?' — currently displayed':''));
  s.style.opacity = i===0 ? '1':'0';
  s.innerHTML = `
    <div class="slide-bg" style="background:${p.bg};"></div>
    <div class="slide-img-wrap">
      <img src="${p.img}" alt="${p.plain}" loading="${i===0?'eager':'lazy'}" width="560" height="420">
    </div>
    <div class="slide-content" style="color:${p.color};">
      <p class="slide-eyebrow">${p.eyebrow}</p>
      <h${i===0?'1':'2'} class="slide-title">${p.title}</h${i===0?'1':'2'}>
      <p class="slide-desc">${p.desc}</p>
      <a href="${p.link}" class="slide-cta" style="color:${p.color};" aria-label="Open case study: ${p.plain}">
        Open Case Study <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>`;
  slidesEl.appendChild(s);

  /* dot */
  const dot = document.createElement('button');
  dot.className = 's-dot' + (i===0?' active':'');
  dot.setAttribute('aria-label',`Project ${i+1}: ${p.plain}`);
  dot.addEventListener('click',()=>goTo(i));
  sideDotsEl.appendChild(dot);
});

/* Colour all chrome to match current slide */
const chromEls = {
  logo:   document.getElementById('nav-logo-el'),
  links:  document.getElementById('nav-links-el'),
  ctr:    document.getElementById('counter'),
  hint:   document.getElementById('scroll-hint'),
  avail:  document.getElementById('avail'),
};
const navLogoImg = document.getElementById('nav-logo-img');
function applyColor(idx) {
  const c = PROJECTS[idx].color;
  const l = PROJECTS[idx].logo;
  chromEls.logo.style.color  = c;
  chromEls.links.style.color = c;
  chromEls.ctr.style.color   = c;
  chromEls.hint.style.color  = c;
  chromEls.avail.style.color = c;
  chromEls.avail.style.borderColor = c;
  // Fade logo out, swap src, fade back in
  navLogoImg.style.opacity = '0';
  setTimeout(() => {
    navLogoImg.src = l;
    navLogoImg.style.opacity = '.9';
  }, 200);
  document.querySelectorAll('.s-dot').forEach((d,i) => {
    d.style.color = c;
    d.style.borderColor = c;
    d.classList.toggle('active', i===idx);
  });
}
applyColor(0);

function updateCounter(idx) {
  ctrInner.style.transition = `transform .3s ${ease}`;
  ctrInner.style.transform = 'translateY(-120%)';
  setTimeout(()=>{
    ctrInner.textContent = pad(idx+1);
    ctrInner.style.transition = 'none';
    ctrInner.style.transform = 'translateY(120%)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      ctrInner.style.transition = `transform .38s ${ease}`;
      ctrInner.style.transform = 'none';
    }));
  },150);
}

function goTo(idx) {
  if (busy || idx<0 || idx>=PROJECTS.length || idx===cur) return;
  busy = true;
  const allSlides = slidesEl.querySelectorAll('.slide');
  allSlides[cur].style.transition = `opacity .55s ${ease}`;
  allSlides[cur].style.opacity = '0';
  allSlides[cur].classList.remove('active');
  allSlides[cur].setAttribute('aria-label', PROJECTS[cur].plain);
  cur = idx;
  allSlides[cur].style.transition = 'none';
  allSlides[cur].style.opacity = '0';
  allSlides[cur].classList.add('active');
  allSlides[cur].setAttribute('aria-label', PROJECTS[cur].plain+' — currently displayed');
  allSlides[cur].getBoundingClientRect();
  allSlides[cur].style.transition = `opacity .7s ${ease}`;
  allSlides[cur].style.opacity = '1';
  applyColor(cur);
  updateCounter(cur);
  setTimeout(()=>{ busy=false; },760);
}

/* ── WHEEL: robust single-advance per gesture ── */
let wLastTime = 0;
const W_COOLDOWN = 900; // ms between advances — matches slide transition duration

window.addEventListener('wheel', e => {
  if (isMob()) return;
  e.preventDefault();

  const now = Date.now();
  // Ignore low-velocity trackpad drift and enforce cooldown
  if (Math.abs(e.deltaY) < 20) return;
  if (now - wLastTime < W_COOLDOWN) return;

  wLastTime = now;
  e.deltaY > 0 ? goTo(cur + 1) : goTo(cur - 1);
}, { passive: false });

/* Touch */
let ty0 = 0;
window.addEventListener('touchstart', e => { ty0 = e.touches[0].clientY; }, { passive: true });
window.addEventListener('touchend', e => {
  if (isMob()) return;
  const d = ty0 - e.changedTouches[0].clientY;
  if (Math.abs(d) > 55) d > 0 ? goTo(cur + 1) : goTo(cur - 1);
}, { passive: true });

/* Keys */
document.addEventListener('keydown', e => {
  if (isMob()) return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') goTo(cur + 1);
  if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  goTo(cur - 1);
});

/* Mobile cards */
const mhb = document.getElementById('m-hero-bg');
if (mhb) mhb.style.backgroundImage = `url('${PROJECTS[0].img}')`;
const mCards = document.getElementById('m-cards');
if (mCards) {
  PROJECTS.forEach((p, i) => {
    const c = document.createElement('a');
    c.className = 'm-card'; c.href = p.link;
    c.setAttribute('aria-label', `View case study: ${p.plain}`);
    c.style.cssText = `background:${p.bg};color:${p.color};`;
    c.innerHTML = `
      <div class="m-card-img"><img src="${p.img}" alt="${p.plain}" loading="${i===0?'eager':'lazy'}" width="400" height="225"></div>
      <div class="m-card-body">
        <div class="m-card-top"><span class="m-card-num">${p.num}</span><span class="m-card-cat">${p.cat}</span></div>
        <div class="m-card-title">${p.title}</div>
        <p class="m-card-desc">${p.desc}</p>
        <div class="m-card-cta">Open Case Study <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
      </div>`;
    mCards.appendChild(c);
  });
}

/* Email copy */
const emailBtn = document.getElementById('email-btn');
const EMAIL = 'hello@saramckeedesign.com';
let copied = false, flipTimer;
function doFlip() {
  if (copied) return; copied = true;
  emailBtn.classList.add('flipped');
  navigator.clipboard.writeText(EMAIL).catch(() => { window.location.href = 'mailto:' + EMAIL; });
  clearTimeout(flipTimer);
  flipTimer = setTimeout(() => { emailBtn.classList.remove('flipped'); copied = false; }, 2600);
}
emailBtn.addEventListener('click', doFlip);
emailBtn.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); doFlip(); } });

/* Loader */
window.addEventListener('load', () => {
  setTimeout(() => {
    const l = document.getElementById('loader');
    l.classList.add('out');
    setTimeout(() => l.remove(), 1050);
  }, 900);
});
</script>
